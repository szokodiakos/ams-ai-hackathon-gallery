<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chaos Brewing</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game">
  <!-- Header -->
  <div id="header">
    <div class="player-health" id="p1-health">
      <span class="player-label">P1</span>
      <span class="pip" id="p1-pip-0">♥</span>
      <span class="pip" id="p1-pip-1">♥</span>
      <span class="pip" id="p1-pip-2">♥</span>
    </div>
    <span id="round-label">ROUND 1</span>
    <div class="player-health" id="p2-health">
      <span class="pip" id="p2-pip-0">♥</span>
      <span class="pip" id="p2-pip-1">♥</span>
      <span class="pip" id="p2-pip-2">♥</span>
      <span class="player-label">P2</span>
    </div>
  </div>

  <!-- Arena -->
  <div id="arena">
    <!-- P1 controls -->
    <div class="controls" id="p1-controls">
      <div class="key-row" data-key="1"><span class="key">1</span> <span class="ingredient">🔥 Scald</span></div>
      <div class="key-row" data-key="2"><span class="key">2</span> <span class="ingredient">🧊 Cool</span></div>
      <div class="key-row" data-key="3"><span class="key">3</span> <span class="ingredient">🌀 Swirl</span></div>
      <div class="key-row" data-key="4"><span class="key">4</span> <span class="ingredient">✨ Boost</span></div>
      <div class="brew-indicator" id="p1-brew"></div>
    </div>

    <!-- Centre -->
    <div id="centre">
      <div id="direction-container"></div>

      <div id="cauldron">
        <div id="cauldron-emoji"></div>
        <div id="cauldron-arrow"></div>
        <div id="reaction-label"></div>
      </div>

      <div id="pressure-container">
        <span class="pressure-label">PRESSURE</span>
        <div id="pressure-bar">
          <div id="pressure-fill"></div>
        </div>
      </div>
    </div>

    <!-- P2 controls -->
    <div class="controls" id="p2-controls">
      <div class="key-row" data-key="7"><span class="key">7</span> <span class="ingredient">🔥 Scald</span></div>
      <div class="key-row" data-key="8"><span class="key">8</span> <span class="ingredient">🧊 Cool</span></div>
      <div class="key-row" data-key="9"><span class="key">9</span> <span class="ingredient">🌀 Swirl</span></div>
      <div class="key-row" data-key="0"><span class="key">0</span> <span class="ingredient">✨ Boost</span></div>
      <div class="brew-indicator" id="p2-brew"></div>
    </div>
  </div>

  <!-- Hint banner (round 1 only) -->
  <div id="hint-banner" class="hidden">TIP: 🧊 right after their 🔥 counters it!</div>

  <!-- Footer reference -->
  <div id="footer">
    <span>🧊 counters 🔥</span>
    <span>🌀 reverses direction</span>
    <span>✨ charges next press</span>
    <span>🌀+🌀 = chaos!</span>
  </div>

  <!-- Overlay -->
  <div id="overlay" class="hidden">
    <div id="overlay-text"></div>
    <div id="overlay-sub"></div>
  </div>
</div>

<script src="bundle.js"></script>
</body>
</html>
